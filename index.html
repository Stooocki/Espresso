<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Espresso"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#6b4030"/>
<title>Espresso Tagebuch</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0e8e0;overscroll-behavior:none;
    padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);}
  input,select,textarea,button{font-family:inherit;}
  input[type=range]{accent-color:#6b4030;width:100%;}
  ::-webkit-scrollbar{display:none;}
</style>
</head>
<body>
<canvas id="ic" width="512" height="512" style="display:none"></canvas>
<div id="root"><div style="height:100vh;display:flex;align-items:center;justify-content:center;background:#f0e8e0;font-family:system-ui;color:#a08878;font-size:16px;">☕ Wird geladen…</div></div>

<script>
(function(){
  const c=document.getElementById('ic'),ctx=c.getContext('2d'),r=80;
  ctx.beginPath();ctx.moveTo(r,0);ctx.lineTo(512-r,0);ctx.quadraticCurveTo(512,0,512,r);
  ctx.lineTo(512,512-r);ctx.quadraticCurveTo(512,512,512-r,512);ctx.lineTo(r,512);
  ctx.quadraticCurveTo(0,512,0,512-r);ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);
  ctx.closePath();ctx.fillStyle='#6b4030';ctx.fill();
  ctx.font='340px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('☕',256,280);
  const iconUrl=c.toDataURL('image/png');
  const al=document.createElement('link');al.rel='apple-touch-icon';al.href=iconUrl;document.head.appendChild(al);
  const manifest={name:'Espresso Tagebuch',short_name:'Espresso',start_url:location.origin+location.pathname,
    display:'standalone',orientation:'portrait',background_color:'#f0e8e0',theme_color:'#6b4030',
    icons:[{src:iconUrl,sizes:'512x512',type:'image/png',purpose:'any maskable'}]};
  const ml=document.createElement('link');ml.rel='manifest';
  ml.href=URL.createObjectURL(new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'}));
  document.head.appendChild(ml);
  if('serviceWorker' in navigator){
    const pageUrl=location.origin+location.pathname;
    const sw=`const CACHE='et-v3';
self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE).then(c=>c.add('${pageUrl}')));self.skipWaiting();});
self.addEventListener('activate',e=>e.waitUntil(clients.claim()));
self.addEventListener('fetch',e=>{e.respondWith(caches.open(CACHE).then(cache=>cache.match(e.request).then(cached=>{
  const net=fetch(e.request).then(r=>{if(r&&r.ok)cache.put(e.request,r.clone());return r;}).catch(()=>cached);
  return cached||net;})));});`;
    navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'})),
      {scope:location.pathname.replace(/[^/]*$/,'')||'/'}).catch(()=>{});
  }
})();
</script>

<script type="text/babel">
const {useState,useEffect,useRef}=React;
const BREW_METHODS=["Alle","Espresso","Filter / V60","Moka Pot","French Press","Aeropress","Chemex","Pour Over","Cold Brew"];
const ROAST_LEVELS=["Hell","Mittelhell","Medium","Mitteldunkel","Dunkel"];
const EMOJI_MAP={"Espresso":"☕","Filter / V60":"🫗","Moka Pot":"🫙","French Press":"🧉","Aeropress":"⚗️","Chemex":"🔬","Pour Over":"🫗","Cold Brew":"🧊"};
const ROAST_COLOR={"Hell":"#c8a87a","Mittelhell":"#b8864e","Medium":"#9a6b3a","Mitteldunkel":"#7a4e28","Dunkel":"#4a2e10"};
const BG="#f0e8e0",CARD="#faf5f0",BROWN="#6b4030",LBROWN="#a0785a",BORDER="#e0d0c4",TEXT="#3d2418",MUTED="#a08878",GREEN="#4caf50";
const BLANK_R={name:"",roaster:"",brew:"Espresso",roast:"Medium",dose:18,yld:36,temp:93,grind:10,notes:"",rating:0,image:null};

function fmtTime(s){if(!s)return"–";const m=Math.floor(s/60),r=s%60;return m>0?`${m}:${String(r).padStart(2,"0")}`:`${s}s`;}
function fmtRatio(d,y){return d&&y?`1:${(y/d).toFixed(1)}`:"–";}
function fmtDate(ts){return new Date(ts).toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit",year:"numeric"});}
function fmtDateTime(ts){return new Date(ts).toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});}
function avgRating(b){if(!b?.length)return 0;return(b.reduce((a,x)=>a+x.rating,0)/b.length).toFixed(1);}

function resizeImage(file){
  return new Promise(resolve=>{
    const img=new Image(),url=URL.createObjectURL(file);
    img.onload=()=>{
      const max=700,scale=Math.min(max/img.width,max/img.height,1);
      const c=document.createElement('canvas');
      c.width=img.width*scale;c.height=img.height*scale;
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      URL.revokeObjectURL(url);resolve(c.toDataURL('image/jpeg',0.82));
    };img.src=url;
  });
}

const IS=(x={})=>({width:"100%",background:BG,border:`1px solid ${BORDER}`,borderRadius:8,padding:"9px 12px",fontSize:15,color:TEXT,boxSizing:"border-box",fontFamily:"inherit",outline:"none",...x});

function Stars({value,onChange,size=28}){
  return <div style={{display:"flex",gap:4,justifyContent:"center"}}>
    {[1,2,3,4,5].map(i=>(
      <span key={i} onClick={()=>onChange&&onChange(i===value?0:i)}
        style={{fontSize:size,cursor:onChange?"pointer":"default",color:i<=value?"#d4a030":"#ddd",lineHeight:1}}>★</span>
    ))}
  </div>;
}
function StarsSmall({value,size=14}){
  if(!value)return null;
  return <span style={{color:"#d4a030",fontSize:size,fontWeight:700}}>{"★".repeat(value)}{"☆".repeat(5-value)}</span>;
}
function GrindSlider({value,onChange}){
  return <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:12,padding:"14px 16px",marginBottom:10}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
      <span style={{fontSize:14,fontWeight:700,color:TEXT}}>⚙️ Mahlgrad</span>
      <span style={{background:BROWN,color:"#fff",borderRadius:14,padding:"3px 12px",fontWeight:900,fontSize:16}}>{value}</span>
    </div>
    <input type="range" min={1} max={50} value={value} onChange={e=>onChange(+e.target.value)}/>
    <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:MUTED,marginTop:2}}>
      <span>1 – sehr fein</span><span>50 – sehr grob</span>
    </div>
  </div>;
}
function TimerWidget({onAccept}){
  const [e,setE]=useState(0),[run,setRun]=useState(false);
  const ref=useRef();
  useEffect(()=>{if(run)ref.current=setInterval(()=>setE(v=>v+1),1000);else clearInterval(ref.current);return()=>clearInterval(ref.current);},[run]);
  const reset=()=>{clearInterval(ref.current);setRun(false);setE(0);};
  return <div style={{background:BG,border:`1px solid ${BORDER}`,borderRadius:12,padding:"14px 16px",marginTop:8}}>
    <div style={{fontSize:40,fontWeight:900,color:BROWN,textAlign:"center",fontVariantNumeric:"tabular-nums"}}>
      {String(Math.floor(e/60)).padStart(2,"0")}:{String(e%60).padStart(2,"0")}
    </div>
    <div style={{display:"flex",gap:8,justifyContent:"center",marginTop:10,flexWrap:"wrap"}}>
      <button onClick={()=>setRun(r=>!r)} style={{background:run?"#c0392b":BROWN,color:"#fff",border:"none",borderRadius:20,padding:"7px 16px",cursor:"pointer",fontWeight:700,fontSize:13}}>
        {run?"⏸ Pause":e>0?"▶ Weiter":"▶ Start"}
      </button>
      <button onClick={reset} style={{background:"transparent",color:MUTED,border:`1px solid ${MUTED}`,borderRadius:20,padding:"7px 14px",cursor:"pointer",fontSize:13}}>↺</button>
      {e>0&&!run&&<button onClick={()=>{onAccept(e);reset();}} style={{background:GREEN,color:"#fff",border:"none",borderRadius:20,padding:"7px 16px",cursor:"pointer",fontWeight:700,fontSize:13}}>✓ {e}s</button>}
    </div>
  </div>;
}
function PhotoUpload({image,onChange}){
  const ref=useRef();
  const handle=async(e)=>{const file=e.target.files?.[0];if(!file)return;onChange(await resizeImage(file));};
  return <div onClick={()=>ref.current.click()}
    style={{borderRadius:16,overflow:"hidden",height:160,marginBottom:12,cursor:"pointer",position:"relative",
      background:image?"transparent":`linear-gradient(135deg,${BORDER},#e8ddd5)`,
      border:image?"none":`2px dashed ${BORDER}`,display:"flex",alignItems:"center",justifyContent:"center"}}>
    {image?<>
      <img src={image} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
      <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.25)",display:"flex",alignItems:"center",justifyContent:"center"}}>
        <span style={{background:"rgba(0,0,0,0.5)",color:"#fff",borderRadius:20,padding:"6px 14px",fontSize:13,fontWeight:600}}>📷 Foto ändern</span>
      </div>
    </>:<div style={{textAlign:"center",color:MUTED}}>
      <div style={{fontSize:36,marginBottom:6}}>📷</div>
      <div style={{fontSize:14,fontWeight:600}}>Foto hinzufügen</div>
      <div style={{fontSize:11,marginTop:2}}>Tippe zum Auswählen</div>
    </div>}
    <input ref={ref} type="file" accept="image/*" onChange={handle} style={{display:"none"}}/>
  </div>;
}

function BrewLogForm({recipe,existing,onSave,onCancel}){
  const def=existing||{dose:recipe.dose,yld:recipe.yld,temp:recipe.temp,grind:recipe.grind,time:0,notes:"",rating:0};
  const [f,setF]=useState({...def});
  const [timerMode,setTimerMode]=useState(false);
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const save=()=>onSave({...f,id:existing?.id||`b${Date.now()}`,date:existing?.date||Date.now()});
  return <div style={{minHeight:"100vh",background:BG}}>
    <div style={{background:CARD,padding:"16px 20px",display:"flex",alignItems:"center",gap:12,borderBottom:`1px solid ${BORDER}`,position:"sticky",top:0,zIndex:10}}>
      <button onClick={onCancel} style={{background:"none",border:"none",fontSize:24,cursor:"pointer",color:MUTED,padding:4}}>←</button>
      <div style={{flex:1,textAlign:"center"}}>
        <div style={{fontSize:17,fontWeight:700,color:TEXT}}>{existing?"Shot bearbeiten":"Neuen Shot erfassen"}</div>
        <div style={{fontSize:12,color:MUTED}}>{recipe.name} · {recipe.roaster}</div>
      </div>
      <div style={{width:32}}/>
    </div>
    <div style={{padding:"16px 16px 110px"}}>
      <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:14,padding:16,marginBottom:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <span style={{fontWeight:700,fontSize:14,color:TEXT}}>Messwerte</span>
          <span style={{background:BROWN,color:"#fff",borderRadius:20,padding:"3px 12px",fontSize:12,fontWeight:700}}>Ratio {fmtRatio(f.dose,f.yld)}</span>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
          {[["⚖️ Dose (g)","dose"],["💧 Yield (g)","yld"],["🌡️ Temp (°C)","temp"]].map(([lbl,k])=>(
            <div key={k}><div style={{fontSize:11,color:MUTED,marginBottom:4}}>{lbl}</div>
              <input type="number" value={f[k]} onChange={e=>set(k,+e.target.value)} style={IS({padding:"8px 10px"})}/></div>
          ))}
        </div>
      </div>
      <GrindSlider value={f.grind} onChange={v=>set("grind",v)}/>
      <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:14,padding:16,marginBottom:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <span style={{fontWeight:700,fontSize:14,color:TEXT}}>⏱ Extraktionszeit</span>
          <button onClick={()=>setTimerMode(t=>!t)} style={{background:timerMode?BROWN:"transparent",color:timerMode?"#fff":BROWN,border:`1px solid ${BROWN}`,borderRadius:20,padding:"5px 14px",cursor:"pointer",fontSize:12,fontWeight:600}}>
            {timerMode?"⌨️ Manuell":"⏱ Timer"}
          </button>
        </div>
        {timerMode?<TimerWidget onAccept={v=>set("time",v)}/>
          :<div style={{display:"flex",alignItems:"center",gap:10}}>
            <input type="number" value={f.time||""} onChange={e=>set("time",+e.target.value)} placeholder="Sekunden" style={IS({flex:1})}/>
            {f.time>0&&<span style={{color:LBROWN,fontWeight:700,fontSize:14,flexShrink:0}}>{fmtTime(f.time)}</span>}
          </div>}
      </div>
      <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:14,padding:16,marginBottom:10}}>
        <div style={{fontWeight:700,fontSize:14,color:TEXT,marginBottom:8}}>📝 Notizen</div>
        <textarea value={f.notes} onChange={e=>set("notes",e.target.value)} placeholder="Aromen, Eindrücke, was du nächstes Mal ändern würdest…" rows={3} style={{...IS(),resize:"vertical",fontSize:14}}/>
      </div>
      <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:14,padding:16,textAlign:"center"}}>
        <div style={{fontWeight:700,fontSize:14,color:TEXT,marginBottom:12}}>⭐ Bewertung dieses Shots</div>
        <Stars value={f.rating} onChange={v=>set("rating",v)}/>
        <div style={{fontSize:12,color:MUTED,marginTop:6}}>{f.rating>0?`${f.rating} von 5 Sternen`:"Tippe zum Bewerten"}</div>
      </div>
    </div>
    <div style={{position:"fixed",bottom:0,left:0,right:0,padding:"12px 16px",background:CARD,borderTop:`1px solid ${BORDER}`}}>
      <button onClick={save} style={{width:"100%",background:GREEN,color:"#fff",border:"none",borderRadius:12,padding:"14px",fontSize:16,fontWeight:700,cursor:"pointer"}}>✓ Shot speichern</button>
    </div>
  </div>;
}

function RecipeForm({initial,onSave,onCancel}){
  const isEdit=!!initial;
  const [f,setF]=useState(initial?{...BLANK_R,...initial}:{...BLANK_R});
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const save=()=>{
    if(!f.name.trim()||!f.roaster.trim()){alert("Kaffee-Name und Rösterei sind Pflichtfelder.");return;}
    onSave({...f,id:initial?.id||`r${Date.now()}`,emoji:EMOJI_MAP[f.brew]||"☕",ratio:fmtRatio(f.dose,f.yld),createdAt:initial?.createdAt||Date.now(),brews:initial?.brews||[]});
  };
  const row={background:CARD,border:`1px solid ${BORDER}`,borderRadius:12,padding:"12px 16px",marginBottom:10,display:"flex",alignItems:"center",gap:12};
  return <div style={{minHeight:"100vh",background:BG}}>
    <div style={{background:CARD,padding:"16px 20px",display:"flex",alignItems:"center",gap:12,borderBottom:`1px solid ${BORDER}`,position:"sticky",top:0,zIndex:10}}>
      <button onClick={onCancel} style={{background:"none",border:"none",fontSize:24,cursor:"pointer",color:MUTED,padding:4}}>←</button>
      <h2 style={{fontSize:17,fontWeight:700,color:TEXT,flex:1,textAlign:"center"}}>{isEdit?"Bohne bearbeiten":"Neue Bohne"}</h2>
      <div style={{width:32}}/>
    </div>
    <div style={{padding:"16px 16px 110px"}}>
      <PhotoUpload image={f.image} onChange={v=>set("image",v)}/>
      {[["☕","Kaffee / Blend-Name *","name"],["🏭","Rösterei *","roaster"]].map(([ico,ph,k])=>(
        <div key={k} style={row}>
          <span style={{fontSize:18,color:LBROWN}}>{ico}</span>
          <input value={f[k]} onChange={e=>set(k,e.target.value)} placeholder={ph} style={{flex:1,background:"none",border:"none",outline:"none",fontSize:15,color:TEXT,fontFamily:"inherit"}}/>
        </div>
      ))}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
        {[["brew",BREW_METHODS.slice(1),"🫗 Brew-Methode"],["roast",ROAST_LEVELS,"🌡️ Röstgrad"]].map(([k,opts,lbl])=>(
          <div key={k} style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:12,padding:"12px 14px"}}>
            <div style={{fontSize:11,color:MUTED,marginBottom:4}}>{lbl}</div>
            <select value={f[k]} onChange={e=>set(k,e.target.value)} style={{width:"100%",background:"none",border:"none",outline:"none",fontSize:14,color:TEXT,fontFamily:"inherit",cursor:"pointer"}}>
              {opts.map(o=><option key={o}>{o}</option>)}
            </select>
          </div>
        ))}
      </div>
      <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:14,padding:16,marginBottom:10}}>
        <div style={{fontWeight:700,fontSize:14,color:TEXT,marginBottom:12}}>Standard-Werte</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
          {[["⚖️ Dose (g)","dose"],["💧 Yield (g)","yld"],["🌡️ Temp (°C)","temp"]].map(([lbl,k])=>(
            <div key={k}><div style={{fontSize:11,color:MUTED,marginBottom:4}}>{lbl}</div>
              <input type="number" value={f[k]} onChange={e=>set(k,+e.target.value)} style={IS({padding:"8px 10px"})}/></div>
          ))}
        </div>
      </div>
      <GrindSlider value={f.grind} onChange={v=>set("grind",v)}/>
      <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:14,padding:16,marginBottom:10}}>
        <div style={{fontWeight:700,fontSize:14,color:TEXT,marginBottom:8}}>📝 Notizen zur Bohne</div>
        <textarea value={f.notes} onChange={e=>set("notes",e.target.value)} placeholder="Herkunft, Aromen, Besonderheiten…" rows={3} style={{...IS(),resize:"vertical",fontSize:14}}/>
      </div>
      <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:14,padding:16,textAlign:"center"}}>
        <div style={{fontWeight:700,fontSize:14,color:TEXT,marginBottom:4}}>⭐ Gesamtbewertung der Bohne</div>
        <div style={{fontSize:12,color:MUTED,marginBottom:12}}>Unabhängig von einzelnen Shots</div>
        <Stars value={f.rating} onChange={v=>set("rating",v)}/>
        <div style={{fontSize:12,color:MUTED,marginTop:6}}>{f.rating>0?`${f.rating} von 5 Sternen`:"Tippe zum Bewerten"}</div>
      </div>
    </div>
    <div style={{position:"fixed",bottom:0,left:0,right:0,padding:"12px 16px",background:CARD,borderTop:`1px solid ${BORDER}`}}>
      <button onClick={save} style={{width:"100%",background:BROWN,color:"#fff",border:"none",borderRadius:12,padding:"14px",fontSize:16,fontWeight:700,cursor:"pointer"}}>✓ {isEdit?"Änderungen speichern":"Bohne speichern"}</button>
    </div>
  </div>;
}

function DetailView({recipe:r,onBack,onEdit,onDelete,onBrewSave,onBrewDelete}){
  const [tab,setTab]=useState("info");
  const [showBrewForm,setShowBrewForm]=useState(false);
  const [editBrew,setEditBrew]=useState(null);
  const rc=ROAST_COLOR[r.roast]||BROWN;
  const brews=[...(r.brews||[])].sort((a,b)=>b.date-a.date);
  const shotAvg=avgRating(brews);
  if(showBrewForm||editBrew){
    return <BrewLogForm recipe={r} existing={editBrew||null}
      onSave={b=>{onBrewSave(r.id,b);setShowBrewForm(false);setEditBrew(null);setTab("tagebuch");}}
      onCancel={()=>{setShowBrewForm(false);setEditBrew(null);}}/>;
  }
  return <div style={{minHeight:"100vh",background:BG}}>
    <div style={{background:CARD,padding:"16px 20px",display:"flex",alignItems:"center",gap:12,borderBottom:`1px solid ${BORDER}`,position:"sticky",top:0,zIndex:10}}>
      <button onClick={onBack} style={{background:"none",border:"none",fontSize:24,cursor:"pointer",color:MUTED,padding:4}}>←</button>
      <h2 style={{margin:0,fontSize:17,fontWeight:700,color:TEXT,flex:1,textAlign:"center",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.name}</h2>
      <div style={{display:"flex",gap:4}}>
        <button onClick={onEdit} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",padding:4}}>✏️</button>
        <button onClick={onDelete} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",padding:4,color:"#c0392b"}}>🗑️</button>
      </div>
    </div>
    <div style={{height:200,overflow:"hidden",position:"relative"}}>
      {r.image?<img src={r.image} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
        :<div style={{height:"100%",background:`linear-gradient(135deg,${rc}33,${rc}55)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:90}}>{r.emoji}</div>}
    </div>
    <div style={{display:"flex",background:CARD,borderBottom:`1px solid ${BORDER}`}}>
      {[["info","☕ Profil"],["tagebuch",`📖 Tagebuch (${brews.length})`]].map(([k,lbl])=>(
        <button key={k} onClick={()=>setTab(k)} style={{flex:1,background:"none",border:"none",padding:"12px 0",fontSize:14,fontWeight:tab===k?700:400,color:tab===k?BROWN:MUTED,borderBottom:tab===k?`2px solid ${BROWN}`:"2px solid transparent",cursor:"pointer"}}>{lbl}</button>
      ))}
    </div>
    <div style={{padding:"14px 14px 90px"}}>
      {tab==="info"&&<>
        <div style={{background:CARD,borderRadius:18,padding:20,marginBottom:12,border:`1px solid ${BORDER}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
            <div>
              <div style={{fontSize:22,fontWeight:900,color:TEXT}}>{r.name}</div>
              <div style={{color:LBROWN,fontWeight:700,fontSize:14}}>{r.roaster}</div>
            </div>
            <span style={{background:rc,color:"#fff",borderRadius:20,padding:"4px 12px",fontSize:12,fontWeight:700,flexShrink:0}}>{r.roast}</span>
          </div>
          {r.rating>0&&<div style={{margin:"12px 0 4px",textAlign:"center"}}>
            <div style={{fontSize:11,color:MUTED,marginBottom:4}}>Gesamtbewertung</div>
            <Stars value={r.rating} size={26}/>
          </div>}
          <div style={{borderTop:`1px solid ${BORDER}`,margin:"14px 0"}}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:brews.length?14:0}}>
            <div><div style={{fontSize:11,color:MUTED}}>☕ Brew-Methode</div><div style={{fontWeight:800,fontSize:16,color:TEXT}}>{r.brew}</div></div>
            <div><div style={{fontSize:11,color:MUTED}}>💧 Std.-Ratio</div><div style={{fontWeight:800,fontSize:16,color:TEXT}}>{r.ratio||fmtRatio(r.dose,r.yld)}</div></div>
          </div>
          {brews.length>0&&<div style={{textAlign:"center",background:BG,borderRadius:12,padding:"10px 0"}}>
            <div style={{fontSize:11,color:MUTED,marginBottom:4}}>Ø aus {brews.length} Shot{brews.length!==1?"s":""}</div>
            <Stars value={Math.round(shotAvg)} size={22}/>
            <div style={{fontSize:12,color:LBROWN,fontWeight:700,marginTop:3}}>{shotAvg} / 5</div>
          </div>}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
          {[["⚖️","Std. Dose","dose","g"],["💧","Std. Yield","yld","g"],["🌡️","Temperatur","temp","°C"],["⚙️","Mahlgrad","grind",""]].map(([ico,lbl,k,u])=>(
            <div key={k} style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:14,padding:"14px"}}>
              <div style={{fontSize:11,color:MUTED}}>{ico} {lbl}</div>
              <div style={{fontSize:22,fontWeight:900,color:TEXT,marginTop:4}}>{r[k]}{u}</div>
            </div>
          ))}
        </div>
        {r.notes&&<div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:14,padding:16}}>
          <div style={{fontSize:11,color:MUTED,marginBottom:4}}>📝 Notizen</div>
          <div style={{fontSize:14,color:TEXT,lineHeight:1.6}}>{r.notes}</div>
        </div>}
      </>}
      {tab==="tagebuch"&&<>
        {brews.length===0
          ?<div style={{textAlign:"center",color:MUTED,marginTop:50}}>
            <div style={{fontSize:48}}>📖</div>
            <div style={{fontWeight:600,color:TEXT,marginTop:10}}>Noch keine Shots erfasst</div>
            <div style={{fontSize:13,marginTop:4}}>Tippe auf „+ Shot" um loszulegen.</div>
          </div>:<>
          {brews.length>1&&<div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:14,padding:16,marginBottom:14}}>
            <div style={{fontWeight:700,fontSize:14,color:TEXT,marginBottom:10}}>📊 Übersicht</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,textAlign:"center"}}>
              <div><div style={{fontSize:11,color:MUTED}}>Shots</div><div style={{fontWeight:800,fontSize:18,color:TEXT}}>{brews.length}</div></div>
              <div><div style={{fontSize:11,color:MUTED}}>Ø Bewertung</div><div style={{fontWeight:800,fontSize:18,color:"#d4a030"}}>{shotAvg}★</div></div>
              <div><div style={{fontSize:11,color:MUTED}}>Letzter</div><div style={{fontWeight:700,fontSize:12,color:TEXT,marginTop:2}}>{fmtDate(brews[0].date)}</div></div>
            </div>
          </div>}
          {brews.map((b,i)=>(
            <div key={b.id} style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:16,padding:16,marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                <div>
                  <div style={{fontSize:12,color:LBROWN,fontWeight:700}}>Shot #{brews.length-i}</div>
                  <div style={{fontSize:12,color:MUTED}}>{fmtDateTime(b.date)}</div>
                </div>
                <div style={{display:"flex",gap:4,alignItems:"center"}}>
                  {b.rating>0&&<span style={{color:"#d4a030",fontWeight:700,fontSize:13}}>{"★".repeat(b.rating)}</span>}
                  <button onClick={()=>setEditBrew(b)} style={{background:"none",border:"none",fontSize:16,cursor:"pointer",padding:"2px 4px",color:LBROWN}}>✏️</button>
                  <button onClick={()=>{if(window.confirm("Shot löschen?"))onBrewDelete(r.id,b.id);}} style={{background:"none",border:"none",fontSize:16,cursor:"pointer",padding:"2px 4px",color:"#c0392b"}}>🗑️</button>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:8}}>
                {[["⚖️",`${b.dose}g`],["💧",`${b.yld}g`],["🌡️",`${b.temp}°C`],["⏱",fmtTime(b.time)]].map(([ico,v])=>(
                  <div key={ico} style={{background:BG,borderRadius:10,padding:"8px 6px",textAlign:"center"}}>
                    <div style={{fontSize:10,color:MUTED}}>{ico}</div>
                    <div style={{fontWeight:700,fontSize:13,color:TEXT}}>{v}</div>
                  </div>
                ))}
              </div>
              <div style={{display:"flex",gap:8,marginBottom:b.notes?8:0,flexWrap:"wrap"}}>
                <div style={{background:BG,borderRadius:10,padding:"6px 12px",fontSize:12,color:TEXT}}>⚙️ Mahlgrad <strong>{b.grind}</strong></div>
                <div style={{background:BG,borderRadius:10,padding:"6px 12px",fontSize:12,color:TEXT}}>Ratio <strong>{fmtRatio(b.dose,b.yld)}</strong></div>
              </div>
              {b.notes&&<div style={{background:BG,borderRadius:10,padding:"8px 12px",fontSize:13,color:TEXT,lineHeight:1.5,fontStyle:"italic"}}>„{b.notes}"</div>}
            </div>
          ))}</>}
      </>}
    </div>
    <div style={{position:"fixed",bottom:16,right:16}}>
      <button onClick={()=>setShowBrewForm(true)} style={{background:GREEN,color:"#fff",border:"none",borderRadius:28,padding:"13px 22px",fontSize:15,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 20px rgba(0,0,0,0.2)"}}>+ Shot</button>
    </div>
  </div>;
}

function RecipeCard({r,onClick}){
  const rc=ROAST_COLOR[r.roast]||BROWN;
  const shots=r.brews?.length||0;
  const shotAvg=avgRating(r.brews);
  return <div onClick={onClick} style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:16,display:"flex",alignItems:"center",cursor:"pointer",marginBottom:10,overflow:"hidden"}}>
    <div style={{width:70,height:70,flexShrink:0,background:r.image?"transparent":`${rc}22`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:30}}>
      {r.image?<img src={r.image} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:r.emoji}
    </div>
    <div style={{flex:1,minWidth:0,padding:"12px 10px"}}>
      <div style={{fontSize:10,color:LBROWN,fontWeight:700,letterSpacing:0.5}}>{r.brew.toUpperCase()}</div>
      <div style={{fontWeight:800,fontSize:15,color:TEXT,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{r.name}</div>
      <div style={{fontSize:12,color:LBROWN}}>{r.roaster}</div>
      <div style={{display:"flex",gap:8,marginTop:4,alignItems:"center",flexWrap:"wrap"}}>
        {r.rating>0&&<StarsSmall value={r.rating}/>}
        <span style={{fontSize:11,color:MUTED}}>⚙️ {r.grind}</span>
        <span style={{fontSize:11,color:MUTED}}>⚖️ {r.dose}g→{r.yld}g</span>
        {shots>0&&<span style={{fontSize:11,background:`${rc}33`,color:BROWN,borderRadius:10,padding:"1px 8px",fontWeight:600}}>📖 {shots} Shot{shots!==1?"s":""}</span>}
        {Number(shotAvg)>0&&<span style={{fontSize:11,color:MUTED}}>Ø {shotAvg}★</span>}
      </div>
    </div>
    <span style={{fontSize:20,color:"#ddd",flexShrink:0,paddingRight:12}}>›</span>
  </div>;
}

function App(){
  const [recipes,setRecipes]=useState([]);
  const [view,setView]=useState("list");
  const [selId,setSelId]=useState(null);
  const [filter,setFilter]=useState("Alle");
  const [search,setSearch]=useState("");
  useEffect(()=>{try{const d=localStorage.getItem("et_recipes");setRecipes(d?JSON.parse(d):[]);}catch{setRecipes([]);};},[]);
  const persist=(data)=>{setRecipes(data);try{localStorage.setItem("et_recipes",JSON.stringify(data));}catch{}};
  const upsertRecipe=(r)=>{const next=recipes.find(x=>x.id===r.id)?recipes.map(x=>x.id===r.id?r:x):[r,...recipes];persist(next);setSelId(r.id);setView("detail");};
  const deleteRecipe=(id)=>{if(!window.confirm("Bohne und alle Shots löschen?"))return;persist(recipes.filter(x=>x.id!==id));setSelId(null);setView("list");};
  const saveBrewLog=(rid,brew)=>{persist(recipes.map(r=>{if(r.id!==rid)return r;const b=r.brews||[];return{...r,brews:b.find(x=>x.id===brew.id)?b.map(x=>x.id===brew.id?brew:x):[brew,...b]};}));};
  const deleteBrewLog=(rid,bid)=>{persist(recipes.map(r=>r.id===rid?{...r,brews:(r.brews||[]).filter(b=>b.id!==bid)}:r));};
  const sel=recipes.find(x=>x.id===selId);
  if(view==="add") return <RecipeForm onSave={upsertRecipe} onCancel={()=>setView("list")}/>;
  if(view==="edit"&&sel) return <RecipeForm initial={sel} onSave={upsertRecipe} onCancel={()=>setView("detail")}/>;
  if(view==="detail"&&sel) return <DetailView recipe={sel} onBack={()=>{setView("list");setSelId(null);}} onEdit={()=>setView("edit")} onDelete={()=>deleteRecipe(sel.id)} onBrewSave={saveBrewLog} onBrewDelete={deleteBrewLog}/>;
  const shown=recipes.filter(r=>{const m=filter==="Alle"||r.brew===filter;const s=!search||r.name.toLowerCase().includes(search.toLowerCase())||r.roaster.toLowerCase().includes(search.toLowerCase());return m&&s;});
  const totalShots=recipes.reduce((a,r)=>a+(r.brews?.length||0),0);
  return <div style={{minHeight:"100vh",background:BG,maxWidth:480,margin:"0 auto"}}>
    <div style={{background:CARD,padding:"18px 16px 12px",borderBottom:`1px solid ${BORDER}`,position:"sticky",top:0,zIndex:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div>
          <div style={{fontSize:20,fontWeight:900,color:TEXT}}>☕ Espresso Tagebuch</div>
          <div style={{fontSize:11,color:MUTED}}>{recipes.length} Bohne{recipes.length!==1?"n":""} · {totalShots} Shot{totalShots!==1?"s":""}</div>
        </div>
        <button onClick={()=>setView("add")} style={{background:BROWN,color:"#fff",border:"none",borderRadius:22,padding:"9px 18px",fontWeight:700,fontSize:14,cursor:"pointer"}}>+ Bohne</button>
      </div>
      <div style={{position:"relative",marginBottom:10}}>
        <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:MUTED,pointerEvents:"none"}}>🔍</span>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Bohne oder Rösterei suchen…"
          style={{width:"100%",background:BG,border:`1px solid ${BORDER}`,borderRadius:10,padding:"9px 12px 9px 36px",fontSize:14,color:TEXT,boxSizing:"border-box",outline:"none",fontFamily:"inherit"}}/>
      </div>
      <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:2}}>
        {BREW_METHODS.map(m=>(
          <button key={m} onClick={()=>setFilter(m)}
            style={{background:filter===m?BROWN:CARD,color:filter===m?"#fff":MUTED,border:`1px solid ${filter===m?BROWN:BORDER}`,borderRadius:20,padding:"5px 14px",fontSize:12,cursor:"pointer",whiteSpace:"nowrap",fontWeight:filter===m?700:400,flexShrink:0}}>
            {filter===m?"✓ ":""}{m}
          </button>
        ))}
      </div>
    </div>
    <div style={{padding:"14px 14px 30px"}}>
      {shown.length===0
        ?<div style={{textAlign:"center",color:MUTED,marginTop:60}}>
          <div style={{fontSize:48}}>☕</div>
          <div style={{marginTop:10,fontWeight:600,color:TEXT}}>Noch keine Bohnen erfasst</div>
          <div style={{fontSize:13,marginTop:4}}>Tippe auf „+ Bohne" um loszulegen.</div>
        </div>
        :shown.map(r=><RecipeCard key={r.id} r={r} onClick={()=>{setSelId(r.id);setView("detail");}}/>)
      }
    </div>
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
