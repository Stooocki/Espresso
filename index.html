<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Espresso"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#6b4030"/>
<title>Espresso Tagebuch</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0e8e0;overscroll-behavior:none;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);}
input,select,textarea,button{font-family:inherit;}
input[type=range]{accent-color:#6b4030;width:100%;}
::-webkit-scrollbar{display:none;}
</style>
</head>
<body>
<canvas id="ic" width="512" height="512" style="display:none"></canvas>
<div id="root"><div style="height:100vh;display:flex;align-items:center;justify-content:center;background:#f0e8e0;color:#a08878;font-size:16px">☕ Wird geladen…</div></div>
<script>
(function(){
  const c=document.getElementById('ic'),ctx=c.getContext('2d');
  ctx.beginPath();ctx.moveTo(80,0);ctx.lineTo(432,0);ctx.quadraticCurveTo(512,0,512,80);ctx.lineTo(512,432);ctx.quadraticCurveTo(512,512,432,512);ctx.lineTo(80,512);ctx.quadraticCurveTo(0,512,0,432);ctx.lineTo(0,80);ctx.quadraticCurveTo(0,0,80,0);ctx.closePath();ctx.fillStyle='#6b4030';ctx.fill();
  ctx.font='340px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('☕',256,280);
  const icon=c.toDataURL('image/png');
  const al=document.createElement('link');al.rel='apple-touch-icon';al.href=icon;document.head.appendChild(al);
  const ml=document.createElement('link');ml.rel='manifest';
  ml.href=URL.createObjectURL(new Blob([JSON.stringify({name:'Espresso Tagebuch',short_name:'Espresso',start_url:location.origin+location.pathname,display:'standalone',orientation:'portrait',background_color:'#f0e8e0',theme_color:'#6b4030',icons:[{src:icon,sizes:'512x512',type:'image/png',purpose:'any maskable'}]})],{type:'application/manifest+json'}));
  document.head.appendChild(ml);
  if('serviceWorker' in navigator){
    const pu=location.origin+location.pathname;
    navigator.serviceWorker.register(URL.createObjectURL(new Blob([`const C='et-v4';self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.add('${pu}')));self.skipWaiting();});self.addEventListener('activate',e=>e.waitUntil(clients.claim()));self.addEventListener('fetch',e=>{e.respondWith(caches.open(C).then(cache=>cache.match(e.request).then(cached=>{const net=fetch(e.request).then(r=>{if(r&&r.ok)cache.put(e.request,r.clone());return r;}).catch(()=>cached);return cached||net;})));});`],{type:'application/javascript'})),{scope:'/'}).catch(()=>{});
  }
})();
</script>
<script type="text/babel">
const {useState,useEffect,useRef,createContext,useContext}=React;
const BMS=["Alle","Espresso","Filter / V60","Moka Pot","French Press","Aeropress","Chemex","Pour Over","Cold Brew"];
const RLS=["Hell","Mittelhell","Medium","Mitteldunkel","Dunkel"];
const PMS=["–","Washed","Natural","Honey","Anaerobic","Pulped Natural","Wet Hulled"];
const EM={"Espresso":"☕","Filter / V60":"🫗","Moka Pot":"🫙","French Press":"🧉","Aeropress":"⚗️","Chemex":"🔬","Pour Over":"🫗","Cold Brew":"🧊"};
const RC={"Hell":"#c8a87a","Mittelhell":"#b8864e","Medium":"#9a6b3a","Mitteldunkel":"#7a4e28","Dunkel":"#4a2e10"};
const LT={BG:"#f0e8e0",CARD:"#faf5f0",BR:"#6b4030",LBR:"#a0785a",BORDER:"#e0d0c4",TX:"#3d2418",MT:"#a08878",GR:"#4caf50",ST:"#d4a030"};
const DK={BG:"#130d0a",CARD:"#1e1410",BR:"#d4956a",LBR:"#c4855a",BORDER:"#3a2418",TX:"#f0e8e0",MT:"#7a6050",GR:"#5cb85c",ST:"#f0b830"};
const TC=createContext(LT);
const useT=()=>useContext(TC);
const BL={name:"",roaster:"",brew:"Espresso",roast:"Medium",dose:18,yld:36,temp:93,grind:10,notes:"",rating:0,image:null,origin:"",process:"–",variety:""};
function ft(s){if(!s)return"–";const m=Math.floor(s/60),r=s%60;return m>0?`${m}:${String(r).padStart(2,"0")}`:`${s}s`;}
function fr(d,y){return d&&y?`1:${(y/d).toFixed(1)}`:"–";}
function fd(ts){return new Date(ts).toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit",year:"numeric"});}
function fdt(ts){return new Date(ts).toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});}
function avgR(b){if(!b?.length)return 0;return b.reduce((a,x)=>a+(x.rating||0),0)/b.length;}
function ri(file){return new Promise(res=>{const img=new Image(),url=URL.createObjectURL(file);img.onload=()=>{const s=Math.min(700/img.width,700/img.height,1);const c=document.createElement("canvas");c.width=img.width*s;c.height=img.height*s;c.getContext("2d").drawImage(img,0,0,c.width,c.height);URL.revokeObjectURL(url);res(c.toDataURL("image/jpeg",0.82));};img.src=url;});}

function StarRating({value,onChange,size=28,justify="center"}){
  const{ST}=useT();
  return <div style={{display:"flex",gap:2,justifyContent:justify}}>
    {[1,2,3,4,5].map(i=>{const full=value>=i,half=!full&&value>=i-0.5;return(
      <span key={i} style={{position:"relative",display:"inline-block",width:size*.95,height:size,fontSize:size,lineHeight:1,cursor:onChange?"pointer":"default",userSelect:"none"}}>
        <span style={{color:"#ccc"}}>★</span>
        {(full||half)&&<span style={{position:"absolute",left:0,top:0,overflow:"hidden",width:full?"100%":"50%",color:ST,whiteSpace:"nowrap"}}>★</span>}
        {onChange&&<><span style={{position:"absolute",left:0,top:0,width:"50%",height:"100%"}} onClick={e=>{e.stopPropagation();onChange(value===i-0.5?0:i-0.5);}}/>
          <span style={{position:"absolute",right:0,top:0,width:"50%",height:"100%"}} onClick={e=>{e.stopPropagation();onChange(value===i?0:i);}}/></>}
      </span>
    );})}
  </div>;
}
function SD({value,size=13}){
  const{ST}=useT();if(!value)return null;
  return <span style={{lineHeight:1}}>{[1,2,3,4,5].map(i=>{const full=value>=i,half=!full&&value>=i-0.5;return(
    <span key={i} style={{position:"relative",display:"inline-block",width:size*.9,height:size}}>
      <span style={{color:"#ccc",fontSize:size}}>★</span>
      {(full||half)&&<span style={{position:"absolute",left:0,top:0,overflow:"hidden",width:full?"100%":"50%",color:ST,fontSize:size,whiteSpace:"nowrap"}}>★</span>}
    </span>);})}</span>;
}
function GS({value,onChange}){
  const t=useT();
  return <div style={{background:t.CARD,border:`1px solid ${t.BORDER}`,borderRadius:12,padding:"14px 16px",marginBottom:10}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
      <span style={{fontSize:14,fontWeight:700,color:t.TX}}>⚙️ Mahlgrad</span>
      <span style={{background:t.BR,color:"#fff",borderRadius:14,padding:"3px 12px",fontWeight:900,fontSize:16}}>{value}</span>
    </div>
    <input type="range" min={1} max={50} value={value} onChange={e=>onChange(+e.target.value)} style={{accentColor:t.BR}}/>
    <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:t.MT,marginTop:2}}><span>1 – sehr fein</span><span>50 – sehr grob</span></div>
  </div>;
}
function TW({onAccept}){
  const t=useT(),[e,setE]=useState(0),[run,setRun]=useState(false),ref=useRef();
  useEffect(()=>{if(run)ref.current=setInterval(()=>setE(v=>v+1),1000);else clearInterval(ref.current);return()=>clearInterval(ref.current);},[run]);
  const reset=()=>{clearInterval(ref.current);setRun(false);setE(0);};
  return <div style={{background:t.BG,border:`1px solid ${t.BORDER}`,borderRadius:12,padding:"14px 16px",marginTop:8}}>
    <div style={{fontSize:40,fontWeight:900,color:t.BR,textAlign:"center",fontVariantNumeric:"tabular-nums"}}>{String(Math.floor(e/60)).padStart(2,"0")}:{String(e%60).padStart(2,"0")}</div>
    <div style={{display:"flex",gap:8,justifyContent:"center",marginTop:10,flexWrap:"wrap"}}>
      <button onClick={()=>setRun(r=>!r)} style={{background:run?"#c0392b":t.BR,color:"#fff",border:"none",borderRadius:20,padding:"7px 16px",cursor:"pointer",fontWeight:700,fontSize:13}}>{run?"⏸ Pause":e>0?"▶ Weiter":"▶ Start"}</button>
      <button onClick={reset} style={{background:"transparent",color:t.MT,border:`1px solid ${t.MT}`,borderRadius:20,padding:"7px 14px",cursor:"pointer",fontSize:13}}>↺</button>
      {e>0&&!run&&<button onClick={()=>{onAccept(e);reset();}} style={{background:t.GR,color:"#fff",border:"none",borderRadius:20,padding:"7px 16px",cursor:"pointer",fontWeight:700,fontSize:13}}>✓ {e}s</button>}
    </div>
  </div>;
}
function PU({image,onChange}){
  const t=useT(),ref=useRef();
  const h=async e=>{const f=e.target.files?.[0];if(!f)return;onChange(await ri(f));};
  return <div onClick={()=>ref.current.click()} style={{borderRadius:16,overflow:"hidden",height:160,marginBottom:12,cursor:"pointer",position:"relative",background:image?"transparent":`linear-gradient(135deg,${t.BORDER},${t.BG})`,border:image?"none":`2px dashed ${t.BORDER}`,display:"flex",alignItems:"center",justifyContent:"center"}}>
    {image?<><img src={image} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
      <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.3)",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{background:"rgba(0,0,0,0.5)",color:"#fff",borderRadius:20,padding:"6px 14px",fontSize:13,fontWeight:600}}>📷 Foto ändern</span></div></>
    :<div style={{textAlign:"center",color:t.MT}}><div style={{fontSize:36,marginBottom:6}}>📷</div><div style={{fontSize:14,fontWeight:600,color:t.TX}}>Foto hinzufügen</div><div style={{fontSize:11,marginTop:2}}>Tippe zum Auswählen</div></div>}
    <input ref={ref} type="file" accept="image/*" onChange={h} style={{display:"none"}}/>
  </div>;
}
function LB({src,onClose}){
  return <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.95)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",cursor:"zoom-out"}}>
    <img src={src} alt="" style={{maxWidth:"95vw",maxHeight:"90vh",objectFit:"contain",borderRadius:8}}/>
    <button onClick={onClose} style={{position:"absolute",top:20,right:20,background:"rgba(255,255,255,0.15)",border:"none",color:"#fff",borderRadius:"50%",width:40,height:40,fontSize:20,cursor:"pointer"}}>✕</button>
  </div>;
}

function Stats({recipes,onBack}){
  const t=useT();
  const ab=recipes.flatMap(r=>(r.brews||[]).map(b=>({...b})));
  const rb=ab.filter(b=>b.rating>0);
  const as=rb.length?(rb.reduce((a,b)=>a+b.rating,0)/rb.length).toFixed(1):0;
  const bb=recipes.filter(r=>r.rating>0).sort((a,b)=>b.rating-a.rating)[0];
  const now=Date.now();
  const wk=Array.from({length:6},(_,i)=>{const e=now-i*7*86400000,s=e-7*86400000;return{l:i===0?"Diese\nWoche":i===1?"Letzte\nWoche":`W-${i+1}`,c:ab.filter(b=>b.date>=s&&b.date<e).length};}).reverse();
  const mw=Math.max(...wk.map(w=>w.c),1);
  const mc={};recipes.forEach(r=>{mc[r.brew]=(mc[r.brew]||0)+1;});
  const ms=Object.entries(mc).sort((a,b)=>b[1]-a[1]);
  const mm=Math.max(...ms.map(m=>m[1]),1);
  const cd={background:t.CARD,border:`1px solid ${t.BORDER}`,borderRadius:14,padding:16,marginBottom:12};
  return <div style={{minHeight:"100vh",background:t.BG}}>
    <div style={{background:t.CARD,padding:"16px 20px",display:"flex",alignItems:"center",gap:12,borderBottom:`1px solid ${t.BORDER}`,position:"sticky",top:0,zIndex:10}}>
      <button onClick={onBack} style={{background:"none",border:"none",fontSize:24,cursor:"pointer",color:t.MT,padding:4}}>←</button>
      <h2 style={{margin:0,fontSize:17,fontWeight:700,color:t.TX,flex:1,textAlign:"center"}}>📊 Statistiken</h2><div style={{width:32}}/>
    </div>
    <div style={{padding:"14px 14px 40px"}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:12}}>
        {[["☕",recipes.length,"Bohnen"],["📖",ab.length,"Shots"],["⭐",as,"Ø Bewertung"]].map(([ico,val,lbl])=>(
          <div key={lbl} style={{...cd,textAlign:"center",marginBottom:0}}><div style={{fontSize:20}}>{ico}</div><div style={{fontWeight:900,fontSize:22,color:t.TX,marginTop:4}}>{val}</div><div style={{fontSize:11,color:t.MT}}>{lbl}</div></div>
        ))}
      </div>
      {bb&&<div style={cd}>
        <div style={{fontSize:11,color:t.MT,marginBottom:8}}>🏆 Beste Bohne</div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:48,height:48,borderRadius:10,overflow:"hidden",flexShrink:0,background:`${RC[bb.roast]||t.BR}33`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>
            {bb.image?<img src={bb.image} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:bb.emoji}
          </div>
          <div><div style={{fontWeight:800,color:t.TX,fontSize:15}}>{bb.name}</div><div style={{fontSize:12,color:t.LBR}}>{bb.roaster}</div><SD value={bb.rating} size={16}/></div>
        </div>
      </div>}
      <div style={cd}>
        <div style={{fontWeight:700,fontSize:14,color:t.TX,marginBottom:14}}>📅 Shots pro Woche</div>
        <div style={{display:"flex",alignItems:"flex-end",gap:6,height:90}}>
          {wk.map((w,i)=>(
            <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
              <div style={{fontSize:11,color:t.MT,fontWeight:700,height:16}}>{w.c||""}</div>
              <div style={{width:"100%",background:i===5?t.BR:t.BR+"55",borderRadius:"4px 4px 0 0",height:`${Math.max((w.c/mw)*60,w.c?4:2)}px`}}/>
              <div style={{fontSize:9,color:t.MT,textAlign:"center",whiteSpace:"pre-line",lineHeight:1.2}}>{w.l}</div>
            </div>
          ))}
        </div>
      </div>
      {ms.length>0&&<div style={cd}>
        <div style={{fontWeight:700,fontSize:14,color:t.TX,marginBottom:12}}>☕ Brew-Methoden</div>
        {ms.map(([m,c])=>(
          <div key={m} style={{marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:t.TX,marginBottom:4}}><span>{m}</span><span style={{fontWeight:700}}>{c}</span></div>
            <div style={{background:t.BORDER,borderRadius:4,height:8}}><div style={{background:t.BR,height:"100%",width:`${(c/mm)*100}%`,borderRadius:4}}/></div>
          </div>
        ))}
      </div>}
    </div>
  </div>;
}

function QS({recipes,onSave,onClose}){
  const t=useT(),[sid,setSid]=useState(recipes[0]?.id||null);
  const sel=recipes.find(r=>r.id===sid);
  const [f,setF]=useState({dose:18,yld:36,temp:93,grind:10,time:0,notes:"",rating:0});
  useEffect(()=>{if(sel)setF({dose:sel.dose,yld:sel.yld,temp:sel.temp,grind:sel.grind,time:0,notes:"",rating:0});},[sid]);
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const save=()=>{if(!sel)return;onSave(sel.id,{...f,id:`b${Date.now()}`,date:Date.now()});onClose();};
  const IS={background:t.CARD,border:`1px solid ${t.BORDER}`,borderRadius:6,padding:"7px 8px",fontSize:14,color:t.TX,boxSizing:"border-box",fontFamily:"inherit",outline:"none",width:"100%"};
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
    <div style={{background:t.CARD,borderRadius:"20px 20px 0 0",width:"100%",maxWidth:480,maxHeight:"90vh",overflow:"auto"}}>
      <div style={{padding:"16px 20px",borderBottom:`1px solid ${t.BORDER}`,display:"flex",alignItems:"center",position:"sticky",top:0,background:t.CARD,zIndex:1}}>
        <h3 style={{margin:0,flex:1,fontSize:16,fontWeight:700,color:t.TX}}>⚡ Schnell-Shot</h3>
        <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:t.MT}}>✕</button>
      </div>
      <div style={{padding:"12px 16px",borderBottom:`1px solid ${t.BORDER}`}}>
        <div style={{fontSize:12,color:t.MT,marginBottom:8,fontWeight:600}}>Bohne wählen</div>
        <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:4}}>
          {recipes.map(r=>(
            <div key={r.id} onClick={()=>setSid(r.id)} style={{flexShrink:0,borderRadius:12,border:`2px solid ${sid===r.id?t.BR:t.BORDER}`,background:sid===r.id?t.BR+"22":t.BG,padding:"8px 12px",cursor:"pointer",textAlign:"center",minWidth:72}}>
              <div style={{width:32,height:32,borderRadius:8,overflow:"hidden",margin:"0 auto",background:`${RC[r.roast]||t.BR}33`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>
                {r.image?<img src={r.image} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:r.emoji}
              </div>
              <div style={{fontSize:10,fontWeight:700,color:sid===r.id?t.BR:t.TX,marginTop:4,maxWidth:72,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.name}</div>
            </div>
          ))}
        </div>
      </div>
      {sel&&<div style={{padding:"12px 16px 24px"}}>
        <div style={{background:t.BG,borderRadius:12,padding:14,marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <span style={{fontWeight:700,fontSize:13,color:t.TX}}>Messwerte</span>
            <span style={{background:t.BR,color:"#fff",borderRadius:16,padding:"2px 10px",fontSize:11,fontWeight:700}}>Ratio {fr(f.dose,f.yld)}</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
            {[["⚖️ Dose","dose"],["💧 Yield","yld"],["🌡️ Temp","temp"]].map(([lbl,k])=>(
              <div key={k}><div style={{fontSize:10,color:t.MT,marginBottom:3}}>{lbl}</div><input type="number" value={f[k]||""} onChange={e=>set(k,+e.target.value)} style={IS}/></div>
            ))}
          </div>
        </div>
        <div style={{background:t.BG,borderRadius:12,padding:"12px 14px",marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <span style={{fontSize:13,fontWeight:700,color:t.TX}}>⚙️ Mahlgrad</span>
            <span style={{background:t.BR,color:"#fff",borderRadius:12,padding:"2px 10px",fontWeight:900,fontSize:14}}>{f.grind}</span>
          </div>
          <input type="range" min={1} max={50} value={f.grind} onChange={e=>set("grind",+e.target.value)} style={{accentColor:t.BR}}/>
        </div>
        <div style={{background:t.BG,borderRadius:12,padding:"12px 14px",marginBottom:10}}>
          <div style={{fontSize:13,fontWeight:700,color:t.TX,marginBottom:6}}>⏱ Zeit (Sekunden)</div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <input type="number" value={f.time||""} onChange={e=>set("time",+e.target.value)} placeholder="Sekunden" style={IS}/>
            {f.time>0&&<span style={{color:t.LBR,fontWeight:700,fontSize:13,flexShrink:0}}>{ft(f.time)}</span>}
          </div>
        </div>
        <textarea value={f.notes} onChange={e=>set("notes",e.target.value)} placeholder="Notizen…" rows={2} style={{width:"100%",background:t.BG,border:`1px solid ${t.BORDER}`,borderRadius:10,padding:"10px 12px",fontSize:13,color:t.TX,boxSizing:"border-box",resize:"none",fontFamily:"inherit",outline:"none",marginBottom:10}}/>
        <div style={{textAlign:"center",marginBottom:14}}>
          <div style={{fontSize:12,color:t.MT,marginBottom:8}}>⭐ Bewertung</div>
          <StarRating value={f.rating} onChange={v=>set("rating",v)} size={30}/>
        </div>
        <button onClick={save} style={{width:"100%",background:t.GR,color:"#fff",border:"none",borderRadius:12,padding:"13px",fontSize:15,fontWeight:700,cursor:"pointer"}}>✓ Shot für „{sel.name}" speichern</button>
      </div>}
    </div>
  </div>;
}

function SP({darkMode,onToggle,onExport,onImport,onClose}){
  const t=useT(),ir=useRef();
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
    <div style={{background:t.CARD,borderRadius:"20px 20px 0 0",width:"100%",maxWidth:480,padding:"20px 16px 36px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h3 style={{margin:0,fontSize:16,fontWeight:700,color:t.TX}}>⚙️ Einstellungen</h3>
        <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:t.MT}}>✕</button>
      </div>

}

function Card({r,onClick}){
  const t=useT(),rc=RC[r.roast]||t.BR,shots=r.brews?.length||0,sa=avgR(r.brews);
  return <div onClick={onClick} style={{background:t.CARD,border:`1px solid ${t.BORDER}`,borderRadius:16,display:"flex",alignItems:"center",cursor:"pointer",marginBottom:10,overflow:"hidden"}}>
    <div style={{width:70,height:70,flexShrink:0,background:r.image?"transparent":`${rc}22`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:30}}>
      {r.image?<img src={r.image} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:r.emoji}
    </div>
    <div style={{flex:1,minWidth:0,padding:"10px 10px"}}>
      <div style={{fontSize:10,color:t.LBR,fontWeight:700,letterSpacing:0.5}}>{r.brew.toUpperCase()}</div>
      <div style={{fontWeight:800,fontSize:15,color:t.TX,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{r.name}</div>
      <div style={{fontSize:12,color:t.LBR}}>{r.roaster}{r.origin?` · ${r.origin}`:""}</div>
      <div style={{display:"flex",gap:6,marginTop:3,alignItems:"center",flexWrap:"wrap"}}>
        {r.rating>0&&<SD value={r.rating} size={12}/>}
        <span style={{fontSize:11,color:t.MT}}>⚙️{r.grind}</span>
        <span style={{fontSize:11,color:t.MT}}>⚖️{r.dose}→{r.yld}g</span>
        {shots>0&&<span style={{fontSize:11,background:`${rc}33`,color:t.BR,borderRadius:10,padding:"1px 7px",fontWeight:600}}>📖{shots}</span>}
        {sa>0&&<span style={{fontSize:11,color:t.MT}}>Ø{sa.toFixed(1)}★</span>}
      </div>
    </div>
    <span style={{fontSize:20,color:t.BORDER,flexShrink:0,paddingRight:12}}>›</span>
  </div>;
}

function App(){
  const[recipes,setRecipes]=useState([]),[view,setView]=useState("list"),[selId,setSelId]=useState(null);
  const[filter,setFilter]=useState("Alle"),[search,setSearch]=useState("");
  const[dark,setDark]=useState(false),[lb,setLb]=useState(null),[qs,setQs]=useState(false),[st,setSt]=useState(false);
  const theme=dark?DK:LT;
  useEffect(()=>{
    try{const d=localStorage.getItem("et_recipes");setRecipes(d?JSON.parse(d):[]);}catch{setRecipes([]);}
    try{const d=localStorage.getItem("et_dark");if(d)setDark(JSON.parse(d));}catch{}
  },[]);
  const persist=d=>{setRecipes(d);try{localStorage.setItem("et_recipes",JSON.stringify(d));}catch{}};
  const toggleDark=()=>{const n=!dark;setDark(n);try{localStorage.setItem("et_dark",JSON.stringify(n));}catch{}};
  const upsert=r=>{const next=recipes.find(x=>x.id===r.id)?recipes.map(x=>x.id===r.id?r:x):[r,...recipes];persist(next);setSelId(r.id);setView("detail");};
  const del=id=>{if(!window.confirm("Bohne und alle Shots löschen?"))return;persist(recipes.filter(x=>x.id!==id));setSelId(null);setView("list");};
  const saveBrew=(rid,brew)=>{persist(recipes.map(r=>{if(r.id!==rid)return r;const b=r.brews||[];return{...r,brews:b.find(x=>x.id===brew.id)?b.map(x=>x.id===brew.id?brew:x):[brew,...b]};}));};
  const delBrew=(rid,bid)=>{persist(recipes.map(r=>r.id===rid?{...r,brews:(r.brews||[]).filter(b=>b.id!==bid)}:r));};
  const exportData=()=>{const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(recipes,null,2)],{type:"application/json"}));a.download="espresso-tagebuch.json";a.click();};
  const importData=e=>{const f=e.target.files?.[0];if(!f)return;const fr=new FileReader();fr.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(Array.isArray(d)&&window.confirm(`${d.length} Bohnen importieren? Aktuelle Daten werden überschrieben.`))persist(d);}catch{alert("Fehler beim Lesen.");}};fr.readAsText(f);e.target.value="";};
  const sel=recipes.find(x=>x.id===selId);
  const shown=recipes.filter(r=>{const m=filter==="Alle"||r.brew===filter;const s=!search||r.name.toLowerCase().includes(search.toLowerCase())||r.roaster.toLowerCase().includes(search.toLowerCase());return m&&s;});
  const ts=recipes.reduce((a,r)=>a+(r.brews?.length||0),0);
  return <TC.Provider value={theme}>
    <div style={{fontFamily:"'Segoe UI',system-ui,sans-serif",maxWidth:480,margin:"0 auto",minHeight:"100vh",background:theme.BG}}>
      {lb&&<LB src={lb} onClose={()=>setLb(null)}/>}
      {qs&&recipes.length>0&&<QS recipes={recipes} onSave={saveBrew} onClose={()=>setQs(false)}/>}
      {st&&<SP darkMode={dark} onToggle={toggleDark} onExport={exportData} onImport={importData} onClose={()=>setSt(false)}/>}
      {view==="add"&&<RF onSave={upsert} onCancel={()=>setView("list")}/>}
      {view==="edit"&&sel&&<RF initial={sel} onSave={upsert} onCancel={()=>setView("detail")}/>}
      {view==="detail"&&sel&&<DV recipe={sel} onBack={()=>{setView("list");setSelId(null);}} onEdit={()=>setView("edit")} onDelete={()=>del(sel.id)} onBrewSave={saveBrew} onBrewDelete={delBrew} onLB={setLb}/>}
      {view==="stats"&&<Stats recipes={recipes} onBack={()=>setView("list")}/>}
      {view==="list"&&<>
        <div style={{background:theme.CARD,padding:"18px 16px 12px",borderBottom:`1px solid ${theme.BORDER}`,position:"sticky",top:0,zIndex:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div><div style={{fontSize:19,fontWeight:900,color:theme.TX}}>☕ Espresso Tagebuch</div>
              <div style={{fontSize:11,color:theme.MT}}>{recipes.length} Bohne{recipes.length!==1?"n":""} · {ts} Shots</div></div>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <button onClick={()=>setView("stats")} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",padding:4}}>📊</button>
              <button onClick={()=>setSt(true)} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",padding:4}}>⚙️</button>
              <button onClick={()=>setView("add")} style={{background:theme.BR,color:"#fff",border:"none",borderRadius:22,padding:"8px 14px",fontWeight:700,fontSize:13,cursor:"pointer"}}>+ Bohne</button>
            </div>
          </div>
          <div style={{position:"relative",marginBottom:10}}>
            <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:theme.MT,pointerEvents:"none"}}>🔍</span>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Bohne oder Rösterei suchen…"
              style={{width:"100%",background:theme.BG,border:`1px solid ${theme.BORDER}`,borderRadius:10,padding:"9px 12px 9px 36px",fontSize:14,color:theme.TX,boxSizing:"border-box",outline:"none",fontFamily:"inherit"}}/>
          </div>
          <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:2}}>
            {BMS.map(m=>(
              <button key={m} onClick={()=>setFilter(m)} style={{background:filter===m?theme.BR:theme.CARD,color:filter===m?"#fff":theme.MT,border:`1px solid ${filter===m?theme.BR:theme.BORDER}`,borderRadius:20,padding:"5px 14px",fontSize:12,cursor:"pointer",whiteSpace:"nowrap",fontWeight:filter===m?700:400,flexShrink:0}}>
                {filter===m?"✓ ":""}{m}
              </button>
            ))}
          </div>
        </div>
        <div style={{padding:"14px 14px 100px"}}>
          {shown.length===0?<div style={{textAlign:"center",color:theme.MT,marginTop:60}}>
            <div style={{fontSize:48}}>☕</div><div style={{marginTop:10,fontWeight:600,color:theme.TX}}>Keine Bohnen gefunden</div>
            <div style={{fontSize:13,marginTop:4}}>Tippe auf „+ Bohne" um loszulegen.</div>
          </div>:shown.map(r=><Card key={r.id} r={r} onClick={()=>{setSelId(r.id);setView("detail");}}/>)}
        </div>
        {recipes.length>0&&<div style={{position:"fixed",bottom:20,right:16}}>
          <button onClick={()=>setQs(true)} style={{background:theme.BR,color:"#fff",border:"none",borderRadius:28,padding:"12px 18px",fontSize:14,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 20px rgba(0,0,0,0.25)"}}>⚡ Schnell-Shot</button>
        </div>}
      </>}
    </div>
  </TC.Provider>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
